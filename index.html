                    </div>
                    <div class="item-description">${project.description}</div>
                </div>
            `).join('');
            
            // Update technical skills categories
            const categories = document.querySelectorAll('.research-category h3');
            categories[0].textContent = data.programmingLanguages;
            categories[1].textContent = data.frameworksTools;
            categories[2].textContent = data.specializedAreas;
            
            // Update technical skills tags
            const programmingTags = document.querySelector('#programming-tags');
            programmingTags.innerHTML = data.skills.programming.map(skill => `<span class="research-tag">${skill}</span>`).join('');
            
            const frameworksTags = document.querySelector('#frameworks-tags');
            frameworksTags.innerHTML = data.skills.frameworks.map(skill => `<span class="research-tag">${skill}</span>`).join('');
            
            const specializedTags = document.querySelector('#specialized-tags');
            specializedTags.innerHTML = data.skills.specialized.map(skill => `<span class="research-tag">${skill}</span>`).join('');
            
            // Update language toggle button
            document.querySelector('.lang-text').textContent = data.langToggle;
        }



        // Enhanced interactive effects
        document.addEventListener('DOMContentLoaded', function() {
            // Language toggle event
            document.getElementById('langToggle').addEventListener('click', toggleLanguage);
            // Smooth scrolling for internal links
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    document.querySelector(this.getAttribute('href')).scrollIntoView({
                        behavior: 'smooth'
                    });
                });
            });

            // Intersection Observer for animations
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = '1';
                        entry.target.style.transform = 'translateY(0)';
                    }
                });
            }, observerOptions);

            // Observe all sections and academic items
            document.querySelectorAll('.section, .academic-item').forEach(element => {
                element.style.opacity = '0';
                element.style.transform = 'translateY(20px)';
                element.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
                observer.observe(element);
            });

            // Add typing effect to name
            const nameElement = document.querySelector('.name');
            const originalText = nameElement.textContent;
            nameElement.textContent = '';
            let i = 0;
            
            function typeWriter() {
                if (i < originalText.length) {
                    nameElement.textContent += originalText.charAt(i);
                    i++;
                    setTimeout(typeWriter, 100);
                }
            }
            
            setTimeout(typeWriter, 500);

            // Add hover effects to research tags
            document.querySelectorAll('.research-tag').forEach(tag => {
                tag.addEventListener('mouseenter', function() {
                    this.style.transform = 'translateY(-2px) scale(1.05)';
                });
                
                tag.addEventListener('mouseleave', function() {
                    this.style.transform = 'translateY(0) scale(1)';
                });
            });
        });
    </script>
</body>
</html>
